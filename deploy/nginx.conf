server {
    listen 5000;
    access_log off;
    error_log /var/log/nginx/error.log error;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Robot-specific API: /api/{robot-id}/...
    # Strips robot ID prefix, proxies to correct backend by port
    location ~ ^/api/(robot-[^/]+)/(.*)$ {
        set $robot_id $1;
        set $api_path $2;

        # Default to robot-a
        set $backend_port 5001;
        if ($robot_id = "robot-b") { set $backend_port 5002; }
        if ($robot_id = "robot-c") { set $backend_port 5003; }

        proxy_pass http://127.0.0.1:$backend_port/api/$api_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Everything else (static files, global API, index.html)
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
